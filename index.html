<!DOCTYPE html>
<html>
<head>
  <title>Dental Appointment</title>
</head>
<body>
  <h2>Book Appointment</h2>

  <form id="bookingForm">
    <input type="text" id="name" placeholder="Your Name" required><br><br>
    <input type="text" id="phone" placeholder="Phone Number" required><br><br>
    <input type="date" id="date" required><br><br>
    <input type="text" id="time" placeholder="Time (e.g. 4PM)" required><br><br>
    <button type="submit">Book</button>
  </form>

  <p id="result"></p>

  <script>
    document.getElementById("bookingForm").addEventListener("submit", function(e) {
      e.preventDefault();

      var data = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value
      };

      fetch("https://script.google.com/macros/s/AKfycbyrdQ7kktJZ7iB2I2nbS0uEsz1vMqiExFG88sKr50GopS8OrkJJ9K9XPere0p5NEspUXQ/exec", {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(result => {
        if (result.status === "FULL") {
          document.getElementById("result").innerText = "Slot is Full!";
        } else {
          document.getElementById("result").innerText = "Appointment Confirmed!";
        }
      })
      .catch(error => {
        document.getElementById("result").innerText = "Error occurred.";
      });
    });
  </script>
</body>

</html>
