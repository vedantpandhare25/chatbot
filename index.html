<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Appointment Booking</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff; /* AliceBlue */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            box-sizing: border-box; /* Ensures padding doesn't widen element */
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        /* Status Messages */
        #message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            display: none; /* Hidden by default */
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .full {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Book Appointment</h2>
        <form id="bookingForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="123-456-7890" required>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="time">Time</label>
                <input type="time" id="time" name="time" required>
            </div>

            <button type="submit" id="submitBtn">Submit Booking</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // TODO: Replace the string below with your actual Web App URL
        const baseUrl = "https://script.google.com/macros/s/AKfycbwxzKCl9mucivMWH3CMT7aZzTcO3TAZWFMa5gfuInOvNGCaybRbq-7p1yCj1iQ6Ne4/exec"; 
        
        // --- ELEMENTS ---
        const form = document.getElementById('bookingForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        // --- EVENT LISTENER ---
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent standard HTML form submission

            // 1. Reset UI
            messageDiv.style.display = 'none';
            messageDiv.className = '';
            submitBtn.disabled = true;
            submitBtn.textContent = "Processing...";

            // 2. Get Values
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;

            // 3. Construct Query String with Encoding
            // We use encodeURIComponent to handle spaces and special chars safely
            const queryString = "?name=" + encodeURIComponent(name) +
                                "&phone=" + encodeURIComponent(phone) +
                                "&date=" + encodeURIComponent(date) +
                                "&time=" + encodeURIComponent(time);

            const finalUrl = baseUrl + queryString;

            // 4. Fetch Data (GET Request)
            fetch(finalUrl)
                .then(response => {
                    // Google Apps Script usually returns a 302 redirect, 
                    // fetch follows it automatically to get the final JSON.
                    return response.json();
                })
                .then(data => {
                    // 5. Handle Logic based on 'status'
                    messageDiv.style.display = 'block';

                    if (data.status === "CONFIRMED") {
                        messageDiv.textContent = "Appointment Confirmed!";
                        messageDiv.classList.add("success");
                        form.reset(); // Clear form on success
                    } else if (data.status === "FULL") {
                        messageDiv.textContent = "Slot is Full!";
                        messageDiv.classList.add("full");
                    } else {
                        // Fallback for unknown status
                        messageDiv.textContent = "Error occurred.";
                        messageDiv.classList.add("error");
                    }
                })
                .catch(error => {
                    // Network errors or JSON parsing errors
                    console.error('Error:', error);
                    messageDiv.style.display = 'block';
                    messageDiv.textContent = "Error occurred.";
                    messageDiv.classList.add("error");
                })
                .finally(() => {
                    // Re-enable button
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Submit Booking";
                });
        });
    </script>

</body>
</html>
